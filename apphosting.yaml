# Firebase App Hosting configuration
# https://firebase.google.com/docs/app-hosting/config

runConfig:
  # Minimum instances kept warm (0 = scale to zero when idle)
  minInstances: 0

  # Maximum instances for auto-scaling
  maxInstances: 10

  # Request timeout - 10 minutes to match API route maxDuration
  # This handles large searches with 20 businesses × 7 AI calls each
  timeoutSeconds: 600

  # CPU allocation (1 = 1 vCPU)
  cpu: 1

  # Memory allocation in MiB
  memoryMiB: 512

  # Maximum concurrent requests per instance
  concurrency: 80

env:
  # --- Server-side secrets (injected at runtime from Google Cloud Secret Manager) ---
  - variable: GOOGLE_PLACES_API_KEY
    secret: GOOGLE_PLACES_API_KEY

  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY

  - variable: SEARCHAPI_IO_API_KEY
    secret: SEARCHAPI_IO_API_KEY

  - variable: FIRECRAWL_API_KEY
    secret: FIRECRAWL_API_KEY

  - variable: TAVILY_API_KEY
    secret: TAVILY_API_KEY

  - variable: APP_ACCESS_PASSWORD
    secret: APP_ACCESS_PASSWORD

  - variable: GOOGLE_SERVICE_ACCOUNT_EMAIL
    secret: GOOGLE_SERVICE_ACCOUNT_EMAIL

  - variable: GOOGLE_PRIVATE_KEY
    secret: GOOGLE_PRIVATE_KEY

  - variable: GOOGLE_DRIVE_FOLDER_ID
    secret: GOOGLE_DRIVE_FOLDER_ID

  # --- Client-side secrets (needed at build time for Next.js client bundle) ---
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    availability:
      - BUILD
      - RUNTIME

  # --- Non-secret config (plain values, not from Secret Manager) ---
  - variable: NEXT_PUBLIC_SEARCH_CHUNK_SIZE
    value: "6"
